apiVersion: apps/v1
kind: Deployment
metadata:
  name: ml-app-deployment
  labels:
    app: ml-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ml-app
  template:
    metadata:
      labels:
        app: ml-app
    spec:
      containers:
      - name: fastapi-container
        image: my-app:v1
        ports:
        - containerPort: 8000
---
apiVersion: v1
kind: Service
metadata:
  name: ml-app-service
spec:
  type: ClusterIP
  selector:
    app: ml-app
  ports:
  - protocol: TCP
    port: 8000
    targetPort: 8000
